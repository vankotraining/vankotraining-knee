name: Update norm completion display

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Check one-time update
        id: gate
        run: |
          if [ -f scripts/apply-norm-completion.py ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm install --silent

      - name: Update knee extension norm presentation
        if: steps.gate.outputs.run == 'true'
        run: python scripts/apply-norm-completion.py

      - name: Verify percentage examples
        if: steps.gate.outputs.run == 'true'
        run: |
          node <<'NODE'
          const assert = require('node:assert/strict');
          const oneDecimal = (value) => value.toFixed(1);

          const target = 50.651;
          assert.equal(oneDecimal(target), '50.7');
          assert.equal(oneDecimal(42.9 / target * 100), '84.7');
          assert.equal(oneDecimal(37.5 / target * 100), '74.0');

          const aboveTarget = 54.881;
          assert.equal(oneDecimal(aboveTarget / target * 100), '108.4');
          assert.equal(oneDecimal(aboveTarget - target), '4.2');
          NODE

      - name: Run full lint
        if: steps.gate.outputs.run == 'true'
        run: npm run lint >/tmp/full-lint.log 2>&1 || true

      - name: Verify known lint baseline
        if: steps.gate.outputs.run == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          log = Path('/tmp/full-lint.log').read_text(encoding='utf-8')
          expected = [
              'src/app/components/ArchivedClients.tsx',
              'src/app/components/ArchivedMeasurements.tsx',
              'src/app/components/KneeDashboard.tsx',
              '✖ 4 problems (3 errors, 1 warning)',
          ]
          missing = [item for item in expected if item not in log]
          if missing:
              raise SystemExit(f'Unexpected full lint result; missing markers: {missing}\n{log}')
          if log.count('react-hooks/set-state-in-effect') != 3:
              raise SystemExit(f'Unexpected set-state-in-effect count.\n{log}')
          if log.count('react-hooks/exhaustive-deps') != 1:
              raise SystemExit(f'Unexpected exhaustive-deps count.\n{log}')
          PY

      - name: Lint changed presentation
        if: steps.gate.outputs.run == 'true'
        run: npx eslint src/app/components/KneeDashboard.tsx --rule 'react-hooks/set-state-in-effect: off' --rule 'react-hooks/exhaustive-deps: off'

      - name: Build
        if: steps.gate.outputs.run == 'true'
        run: npm run build

      - name: Finalize project control
        if: steps.gate.outputs.run == 'true'
        run: |
          cat >> project-control/norm-completion-display-2026-07-14.md <<'EOF'

          ## CI vysledek

          - Plny `npm run lint` byl spusten. Projekt ma znamy vychozi stav 3 chyb a 1 varovani v `ArchivedClients.tsx`, `ArchivedMeasurements.tsx` a v existujicim efektu `KneeDashboard.tsx`; tato mista nejsou soucasti zadane prezentacni upravy.
          - Samostatny lint upraveneho `KneeDashboard.tsx` po vypnuti pouze uvedenych existujicich pravidel probehl uspesne bez nove chyby.
          - `npm run build` probehl uspesne.
          EOF

      - name: Commit verified changes and remove one-time files
        if: steps.gate.outputs.run == 'true'
        run: |
          rm .github/workflows/update-norm-completion.yml
          rm scripts/apply-norm-completion.py
          rm -f .github/norm-completion-trigger project-control/lint-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/components/KneeDashboard.tsx src/app/globals.css project-control/norm-completion-display-2026-07-14.md .github/workflows/update-norm-completion.yml scripts/apply-norm-completion.py .github/norm-completion-trigger project-control/lint-failure.log
          git commit -m "Show percentage of knee norm completion"
          git push
